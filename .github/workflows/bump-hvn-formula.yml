# Keeps Formula/hvn-agentkit.rb in sync with the latest vietairs/hvn-cli release.
# Self-contained: runs in this repo with the default GITHUB_TOKEN (no PAT),
# polling on a schedule instead of a cross-repo release trigger.
name: bump-hvn-formula

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump formula if a newer hvn-cli release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LATEST=$(gh api repos/vietairs/hvn-cli/releases/latest --jq .tag_name)   # e.g. v1.0.0
          CURRENT=$(sed -n 's|.*refs/tags/\(v[0-9][0-9.]*[0-9]\)\.tar\.gz.*|\1|p' Formula/hvn-agentkit.rb)
          echo "latest=$LATEST current=$CURRENT"
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "Formula already up to date."
            exit 0
          fi
          URL="https://github.com/vietairs/hvn-cli/archive/refs/tags/${LATEST}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)
          sed -i -E "s|refs/tags/v[0-9.]+\.tar\.gz|refs/tags/${LATEST}.tar.gz|" Formula/hvn-agentkit.rb
          sed -i -E "s|sha256 \"[a-f0-9]{64}\"|sha256 \"${SHA}\"|" Formula/hvn-agentkit.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hvn-agentkit.rb
          git commit -m "feat: bump hvn-agentkit to ${LATEST}"
          git push
